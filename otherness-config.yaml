  upgrade_policy: "0.x.x"  # auto-upgrade any 0.* release
  report_issue: 439
  board_url: "https://github.com/users/pnz1990/projects/2/views/1"
  pr_label: "kro-ui"
  job_family: FEE

maqa:
  mode: standalone
  agents_path: ~/.otherness/agents
  status_update_cycles: 5
  product_validation_cycles: 3
  session_item_limit: 2    # 2 items — kro-ui e2e is slow, keep under 60min OIDC window
  autonomous_mode: true    # operator authorized — agent acts on their behalf

schedule:
  cron: "0 * * * *"       # every hour — active development cadence
  model: "amazon-bedrock/global.anthropic.claude-sonnet-4-6"

