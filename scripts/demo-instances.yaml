# demo-instances.yaml — rich set of demo instances applied by scripts/demo.sh.
#
# Goals:
#   - Dozens of instances across all RGD kinds so the Overview page feels alive
#   - Varied field values so health badges, instance lists, and DAGs are interesting
#   - Cover every node type: NodeTypeResource, NodeTypeCollection, NodeTypeExternal,
#     NodeTypeExternalCollection (via upstream RGDs), includeWhen, readyWhen, forEach
#   - Interesting CEL expressions visible in the YAML tab and Designer
#   - Some instances intentionally in degraded/incomplete states (e.g. enableParent: false)
#     so health roll-up badges show non-Ready states
#
# All instances target the kro-ui-demo namespace (created by demo.sh).
# Cluster-scoped instances (ClusterApp) have no namespace.

