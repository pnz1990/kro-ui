<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- kro-ui favicon: simplified DAG icon — two nodes connected by an edge -->
  <rect width="32" height="32" rx="6" fill="#5b8ef0"/>
  <!-- Top node -->
  <circle cx="16" cy="9" r="4" fill="white" opacity="0.95"/>
  <!-- Bottom-left node -->
  <circle cx="9" cy="23" r="4" fill="white" opacity="0.95"/>
  <!-- Bottom-right node -->
  <circle cx="23" cy="23" r="4" fill="white" opacity="0.95"/>
  <!-- Edges -->
  <line x1="16" y1="13" x2="9" y2="19" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="13" x2="23" y2="19" stroke="white" stroke-width="1.5" opacity="0.7"/>
</svg>
