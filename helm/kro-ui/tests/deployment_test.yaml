# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/master/schema/helm-testsuite.json
suite: kro-ui deployment tests
templates:
  - deployment.yaml
release:
  name: kro-ui
  namespace: kro-system
tests:
  - it: should be a Deployment
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: metadata.name
          value: kro-ui

  - it: should have correct namespace
    set:
      namespace: kro-system
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: metadata.namespace
          value: kro-system

  - it: should have 1 replica
    set:
      replicaCount: 1
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use service account
    set:
      serviceAccount:
        name: kro-ui
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: kro-ui

  - it: should run as non-root
    set:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: should drop all capabilities
    set:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL

  - it: should have read-only root filesystem
    set:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should not allow privilege escalation
    set:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should use correct image
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/pnz1990/kro-ui:0.9.4

  - it: should have serve args
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: serve

  - it: should expose http port
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 40107

  - it: should have liveness probe
    set:
      livenessProbe:
        httpGet:
          path: /api/v1/healthz
          port: http
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe.httpGet
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/v1/healthz

  - it: should have readiness probe
    set:
      readinessProbe:
        httpGet:
          path: /api/v1/healthz
          port: http
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - exists:
          path: spec.template.spec.containers[0].readinessProbe.httpGet
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/v1/healthz

  - it: should mount kubeconfig secret when secretName is set
    set:
      kubeconfig:
        secretName: my-kubeconfig
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - exists:
          path: spec.template.spec.volumes
      - equal:
          path: spec.template.spec.volumes[0].name
          value: kubeconfig
      - equal:
          path: spec.template.spec.volumes[0].secret.secretName
          value: my-kubeconfig
      - exists:
          path: spec.template.spec.containers[0].volumeMounts
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: kubeconfig
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/kro-ui/kubeconfig

  - it: should set KUBECONFIG env var when secretName is set
    set:
      kubeconfig:
        secretName: my-kubeconfig
        secretKey: kubeconfig
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - exists:
          path: spec.template.spec.containers[0].env
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: KUBECONFIG
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: /etc/kro-ui/kubeconfig/kubeconfig

  - it: should set --context arg when context is set
    set:
      kubeconfig:
        secretName: my-kubeconfig
        context: prod-cluster
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: --context=prod-cluster

  - it: should not add volumes when kubeconfig is not configured
    set:
      image:
        repository: ghcr.io/pnz1990/kro-ui
        tag: "0.9.4"
      service:
        port: 40107
    asserts:
      - notExists:
          path: spec.template.spec.volumes
      - notExists:
          path: spec.template.spec.containers[0].env
