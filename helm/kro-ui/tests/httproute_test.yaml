# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/master/schema/helm-testsuite.json
suite: kro-ui httproute tests
templates:
  - httproute.yaml
release:
  name: kro-ui
  namespace: kro-system
tests:
  - it: should not render when httproute is disabled
    set:
      httproute:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    set:
      httproute:
        enabled: true
        gateway:
          name: eg-internal
          namespace: gateway
        hostnames:
          - kro.internal
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: kro-ui
      - equal:
          path: metadata.namespace
          value: kro-system

  - it: should reference correct Gateway
    set:
      httproute:
        enabled: true
        gateway:
          name: eg-internal
          namespace: gateway
    asserts:
      - equal:
          path: spec.parentRefs[0].group
          value: gateway.networking.k8s.io
      - equal:
          path: spec.parentRefs[0].kind
          value: Gateway
      - equal:
          path: spec.parentRefs[0].name
          value: eg-internal
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway

  - it: should have hostname
    set:
      httproute:
        enabled: true
        hostnames:
          - kro.internal
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: kro.internal

  - it: should route to kro-ui service
    set:
      httproute:
        enabled: true
      service:
        port: 40107
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: kro-ui
      - equal:
          path: spec.rules[0].backendRefs[0].namespace
          value: kro-system
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 40107

  - it: should use PathPrefix match
    set:
      httproute:
        enabled: true
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /