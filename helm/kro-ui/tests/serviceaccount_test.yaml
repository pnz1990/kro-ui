# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/master/schema/helm-testsuite.json
suite: kro-ui serviceaccount tests
templates:
  - serviceaccount.yaml
release:
  name: kro-ui
  namespace: kro-system
tests:
  - it: should be a ServiceAccount
    set:
      serviceAccount:
        create: true
        automount: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should have correct name
    set:
      serviceAccount:
        create: true
        name: kro-ui
    asserts:
      - equal:
          path: metadata.name
          value: kro-ui

  - it: should have correct namespace
    set:
      namespace: kro-system
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: metadata.namespace
          value: kro-system

  - it: should automount token
    set:
      serviceAccount:
        create: true
        automount: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true