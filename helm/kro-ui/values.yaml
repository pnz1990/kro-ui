replicaCount: 1

image:
  repository: ghcr.io/pnz1990/kro-ui
  pullPolicy: IfNotPresent
  tag: ""  # defaults to chart appVersion

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 40107

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kro-ui.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Pod-level security context.
# runAsNonRoot=true and a non-zero UID are enforced by default to comply with
# PodSecurity admission (restricted profile) and CIS Kubernetes benchmarks.
# The distroless base image ships nobody (UID 65534); override if your cluster
# requires a specific UID.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
# readOnlyRootFilesystem: true — the binary writes nothing to disk at runtime.
# allowPrivilegeEscalation: false — prevents setuid/setgid attacks.
# capabilities.drop: [ALL] — drops all Linux capabilities.
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Run mode: "incluster" (default) or "kubeconfig"
runMode: incluster

# Only used when runMode=kubeconfig — mount a kubeconfig secret
kubeconfig:
  secretName: ""
  secretKey: config
