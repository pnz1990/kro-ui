apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kro-ui.fullname" . }}
  labels:
    {{- include "kro-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kro-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kro-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kro-ui.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kro-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - serve
            - --port={{ .Values.service.port }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if eq .Values.runMode "kubeconfig" }}
          env:
            - name: KUBECONFIG
              value: /etc/kubeconfig/{{ .Values.kubeconfig.secretKey }}
          volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kubeconfig
              readOnly: true
          {{- end }}
      {{- if eq .Values.runMode "kubeconfig" }}
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
      {{- end }}
