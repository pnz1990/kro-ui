apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kro-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kro-ui.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kro-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kro-ui.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kro-ui.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --port={{ .Values.service.port }}
            {{- if .Values.kubeconfig.context }}
            - --context={{ .Values.kubeconfig.context }}
            {{- end }}
          {{- if .Values.kubeconfig.secretName }}
          env:
            - name: KUBECONFIG
              value: /etc/kro-ui/kubeconfig/{{ .Values.kubeconfig.secretKey }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.volumeMounts .Values.kubeconfig.secretName }}
          volumeMounts:
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            {{- if .Values.kubeconfig.secretName }}
            - name: kubeconfig
              mountPath: /etc/kro-ui/kubeconfig
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.volumes .Values.kubeconfig.secretName }}
      volumes:
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        {{- if .Values.kubeconfig.secretName }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
            items:
              - key: {{ .Values.kubeconfig.secretKey }}
                path: {{ .Values.kubeconfig.secretKey }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
