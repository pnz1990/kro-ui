apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kro-ui.fullname" . }}
  labels:
    {{- include "kro-ui.labels" . | nindent 4 }}
rules:
  # kro resources — RGDs live under kro.run; GraphRevisions live under internal.kro.run (kro v0.9.0+)
  - apiGroups: ["kro.run"]
    resources: ["resourcegraphdefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["internal.kro.run"]
    resources: ["graphrevisions"]
    verbs: ["get", "list", "watch"]
  # CRD discovery — needed to find the generated CRD for each RGD
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # All resources read-only — kro creates CRs of any kind.
  # watch is included for consistency with the kro resources rule above;
  # the backend is polling-based and does not call Watch() today, but
  # the constitution allows get/list/watch (§III) and omitting it from
  # this wildcard rule while granting it above was inconsistent (#154).
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Events and namespaces
  - apiGroups: [""]
    resources: ["events", "namespaces"]
    verbs: ["get", "list", "watch"]
  # Pod proxy — required for per-context kro controller metrics scraping (spec 040)
  - apiGroups: [""]
    resources: ["pods/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kro-ui.fullname" . }}
  labels:
    {{- include "kro-ui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kro-ui.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kro-ui.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
