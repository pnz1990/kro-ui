name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v6

      # ── Go + frontend build ───────────────────────────────────────────────
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies (web)
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-web-

      - name: Build frontend
        run: bun install && bun run build
        working-directory: web

      - name: Build kro-ui binary
        run: make go

      # ── Kind + Helm (Helm is used to install the kro controller) ─────────────
      - uses: helm/kind-action@v1
        with:
          cluster_name: kro-ui-e2e
          # kind-action creates the cluster but does NOT export the kubeconfig
          # to a file — global-setup.ts does that with `kind get kubeconfig`
          wait: 120s

      - uses: azure/setup-helm@v5

      # ── Playwright ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache bun dependencies (e2e)
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-e2e-${{ hashFiles('test/e2e/bun.lock') }}
          restore-keys: bun-e2e-

      - name: Install e2e deps
        run: bun install
        working-directory: test/e2e

      # Cache the Playwright Chromium browser binary.
      # Keyed on the Playwright version from the lockfile so cache is
      # invalidated on version bumps. The --with-deps OS package install
      # cannot be cached, but the ~300MB browser binary download can be.
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('test/e2e/bun.lock') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright browsers (Chromium only)
        # Always run --with-deps to ensure OS-level dependencies (libglib2, etc.)
        # are present even on cache hits. Skip the slow browser download when
        # the cache was restored by passing --no-shell.
        # On cache miss the full install runs normally.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install --with-deps chromium
          else
            bunx playwright install chromium --with-deps
          fi
        working-directory: test/e2e

      - name: Run E2E journeys
        run: bun run test -- --reporter=list,html,json
        working-directory: test/e2e
        env:
          # Tell global-setup to skip kind create (kind-action already did it)
          SKIP_KIND_CREATE: "true"
          KRO_UI_BINARY: ${{ github.workspace }}/bin/kro-ui
          # Pin kro controller chart version to avoid a GitHub API call per run.
          # Bump this when upgrading the kro controller in CI.
          KRO_CHART_VERSION: "0.9.1"
          CI: "true"
          # Write JSON results to a file so the anchor step can read pass/fail counts.
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json

      - name: Post anchor score
        if: always()
        working-directory: test/e2e
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JOURNEYS=$(ls journeys/*.spec.ts 2>/dev/null | wc -l | tr -d ' ')
          PASS=0
          FAIL=0
          if [ -f results.json ]; then
            PASS=$(python3 -c "import json,sys; d=json.load(open('results.json')); print(d.get('stats',{}).get('expected',0))" 2>/dev/null || echo 0)
            FAIL=$(python3 -c "import json,sys; d=json.load(open('results.json')); print(d.get('stats',{}).get('unexpected',0))" 2>/dev/null || echo 0)
          fi
          DATE=$(date -u +%Y-%m-%d)
          gh issue comment 439 --repo pnz1990/kro-ui \
            --body "[ANCHOR | kro-ui | ${DATE}] journeys: ${JOURNEYS} | pass: ${PASS} fail: ${FAIL}" \
            || true  # non-fatal: anchor comment failure must not block CI

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 7

      - name: Upload test traces (failure only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test/e2e/test-results/
          retention-days: 3
