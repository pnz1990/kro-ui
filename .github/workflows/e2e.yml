name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── Go + frontend build ───────────────────────────────────────────────
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: bun install && bun run build
        working-directory: web

      - name: Build kro-ui binary
        run: make go

      # ── Kind + Helm ───────────────────────────────────────────────────────
      - uses: helm/kind-action@v1
        with:
          cluster_name: kro-ui-e2e
          # kind-action creates the cluster but does NOT export the kubeconfig
          # to a file — global-setup.ts does that with `kind get kubeconfig`
          wait: 120s

      - uses: azure/setup-helm@v4

      # ── Playwright ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install e2e deps
        run: bun install
        working-directory: test/e2e

      - name: Install Playwright browsers (Chromium only)
        run: bunx playwright install chromium --with-deps
        working-directory: test/e2e

      - name: Run E2E journeys
        run: bun run test
        working-directory: test/e2e
        env:
          # Tell global-setup to skip kind create (kind-action already did it)
          SKIP_KIND_CREATE: "true"
          KRO_UI_BINARY: ${{ github.workspace }}/bin/kro-ui
          CI: "true"

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 7

      - name: Upload test traces (failure only)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test/e2e/test-results/
          retention-days: 3
