# external-ref-prereq — the pre-existing ConfigMap read by the external-ref RGD
# via externalRef. Must be applied before the RGD and its instance.
#
# The external-ref RGD references this ConfigMap at:
#   externalRef.apiVersion: v1
#   externalRef.kind: ConfigMap
#   externalRef.metadata.name: kro-ui-external-input
#   externalRef.metadata.namespace: kro-ui-e2e
apiVersion: v1
kind: ConfigMap
metadata:
  name: kro-ui-external-input
  namespace: kro-ui-e2e
data:
  ECHO_VALUE: "hello-from-external-ref"
