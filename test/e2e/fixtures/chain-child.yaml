# chain-child RGD — E2E fixture for spec 025 (RGD static chaining graph).
#
# spec.schema.kind: ChainChild — matches the template.kind in chain-parent.yaml.
# Has two resource nodes (ConfigMap + ServiceAccount) so the expanded subgraph
# has visible content when chain-parent's myChild node is expanded.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: chain-child
spec:
  schema:
    apiVersion: v1alpha1
    kind: ChainChild
    group: e2e.kro-ui.dev
    spec:
      name: string | default=chain-child-resource
  resources:
    - id: childConfigMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-config
        data:
          source: chain-child

    - id: childServiceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}-sa
