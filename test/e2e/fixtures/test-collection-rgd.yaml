# test-collection RGD — E2E fixture for forEach collection node annotation tests.
#
# kro v0.8.5+ array-of-objects forEach format:
#   forEach: [{region: "${schema.spec.regions}"}]
# → dag.ts renders as: "region: ${schema.spec.regions}"
#
# The data-testid "dag-node-foreach-regionConfig" is asserted in journey 010.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: test-collection
spec:
  schema:
    apiVersion: v1alpha1
    kind: RegionalDeployment
    group: e2e.kro-ui.dev
    spec:
      regions:
        type: "array"
        items:
          type: "string"
  resources:
    - id: regionConfig
      forEach:
        - region: "${schema.spec.regions}"
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-${region}-config
          namespace: kro-ui-e2e
        data:
          region: "${region}"
