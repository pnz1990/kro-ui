# chain-parent RGD — E2E fixture for spec 025 (RGD static chaining graph).
#
# Contains a resource whose kind is ChainChild, which matches chain-child RGD's
# spec.schema.kind. This makes the node "chainable" and enables testing of:
#   - Chain detection (node-chainable class applied)
#   - Expand toggle (▸ shows teal, not grey)
#   - "View RGD →" navigation link
#
# Intentionally minimal — only the fields needed for chain detection testing.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: chain-parent
spec:
  schema:
    apiVersion: v1alpha1
    kind: ChainParent
    group: e2e.kro-ui.dev
    spec:
      name: string | default=chain-test
  resources:
    - id: myChild
      template:
        apiVersion: kro.run/v1alpha1
        kind: ChainChild
        metadata:
          name: ${schema.spec.name}-child
