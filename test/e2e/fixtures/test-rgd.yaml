# test-app RGD — deterministic fixture for E2E tests.
#
# Deliberately simple: 3 resources, 1 specPatch node, 1 includeWhen node.
# This covers every node type exercised by the E2E journeys without being
# complex enough to introduce flaky reconciliation timing.
#
# All names and namespaces are fixed so test assertions can use literals.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: test-app
spec:
  schema:
    apiVersion: e2e.kro.run/v1alpha1
    kind: TestApp
    spec:
      appName: string | default=kro-ui-test
      enableConfigMap: boolean | default=true
  resources:
    - id: appNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.appName}
        spec: {}

    - id: appConfig
      includeWhen:
        - ${schema.spec.enableConfigMap}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-config
          namespace: ${appNamespace.metadata.name}
        data:
          app: ${schema.spec.appName}

    - id: appStatus
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-status
          namespace: ${appNamespace.metadata.name}
        data:
          ready: "true"
  readyWhen:
    - ${appNamespace.status.phase == "Active"}
