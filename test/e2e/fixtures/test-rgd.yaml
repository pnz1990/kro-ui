# test-app RGD — deterministic fixture for E2E tests.
#
# Represents a realistic web service composed of a Namespace and two
# ConfigMaps. Deliberately simple so reconciliation completes quickly.
#
# Covers all node types exercised by E2E journeys:
#   - root CR node (WebApp)
#   - 2 managed resource nodes (appNamespace, appConfig)
#   - 1 includeWhen conditional node (appConfig)
#   - 1 readyWhen expression
#
# All names are fixed so Playwright assertions can use literals.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: test-app
spec:
  schema:
    apiVersion: e2e.kro-ui.dev/v1alpha1
    kind: WebApp
    spec:
      appName: string | default=kro-ui-test
      enableConfig: boolean | default=true
  resources:
    - id: appNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.appName}

    - id: appConfig
      includeWhen:
        - ${schema.spec.enableConfig}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-config
          namespace: ${appNamespace.metadata.name}
        data:
          app: ${schema.spec.appName}
          version: "v1"

    - id: appStatus
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-status
          namespace: ${appNamespace.metadata.name}
        data:
          ready: "true"
  readyWhen:
    - ${appNamespace.status.phase == "Active"}
