# test-app RGD — deterministic fixture for E2E tests.
#
# Uses only upstream kro v1alpha1 features (kubernetes-sigs/kro):
#   - NodeTypeInstance: root WebApp CR (variable: schema)
#   - NodeTypeResource: appNamespace, appStatus (plain template resources)
#   - NodeTypeResource + includeWhen: appConfig (conditional node)
#
# Deliberately simple: 3 resources covers all common node types exercised
# by E2E journeys without requiring long reconciliation times.
#
# CEL expressions used:
#   - ${schema.spec.appName}    — instance spec reference
#   - ${schema.spec.enableConfig} — boolean from schema spec (includeWhen)
#   - ${appNamespace.metadata.name} — inter-resource reference
#   - ${appNamespace.status.phase == "Active"} — readyWhen
#
# All names are fixed so Playwright assertions can use literals.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: test-app
spec:
  schema:
    apiVersion: v1alpha1
    kind: WebApp
    group: e2e.kro-ui.dev
    spec:
      appName: string | default=kro-ui-test
      enableConfig: boolean | default=true
    status:
      phase: ${appNamespace.status.phase}
  resources:
    - id: appNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.appName}
      readyWhen:
        - ${appNamespace.status.phase == "Active"}

    - id: appConfig
      includeWhen:
        - ${schema.spec.enableConfig}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-config
          namespace: ${appNamespace.metadata.name}
        data:
          app: ${schema.spec.appName}
          version: "v1"

    - id: appStatus
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-status
          namespace: ${appNamespace.metadata.name}
        data:
          ready: "true"
