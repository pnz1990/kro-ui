# external-ref RGD — E2E fixture for NodeTypeExternal rendering tests.
#
# Adapted from kubernetes-sigs/kro test/e2e/chainsaw/check-external-references/rgd.yaml
#
# Node types exercised:
#   - NodeTypeInstance: root EchoApp CR (variable: schema)
#   - NodeTypeExternal: inputConfig (reads kro-ui-external-input ConfigMap by name)
#   - NodeTypeResource: echoOutput (owned ConfigMap, references inputConfig field)
#
# CEL expressions used:
#   - ${schema.spec.name}                                  — schema spec reference
#   - ${inputConfig.?data.ECHO_VALUE.orValue("not found")} — optional chaining + orValue
#
# The optional-chaining and orValue expressions exercise token types not present
# in test-rgd.yaml and are asserted in journey 006 step 9.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: external-ref
spec:
  schema:
    apiVersion: v1alpha1
    kind: EchoApp
    group: e2e.kro-ui.dev
    spec:
      name: string | default=kro-ui-echo
    status:
      echoValue: ${echoOutput.data.ECHO_VALUE}
  resources:
    - id: inputConfig
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: kro-ui-external-input
          namespace: kro-ui-e2e

    - id: echoOutput
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-echo
          namespace: kro-ui-e2e
        data:
          ECHO_VALUE: '${inputConfig.?data.ECHO_VALUE.orValue("not found")}'
          SOURCE: kro-ui-external-input
