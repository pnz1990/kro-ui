# chain-cycle-a RGD — E2E fixture for spec 025 cycle detection testing.
#
# CycleA has a resource of kind CycleB.
# chain-cycle-b.yaml has a resource of kind CycleA.
# Together they form a mutual cycle: A → B → A.
# Used to verify that cycle detection shows ⊗ Cycle indicator on the inner node
# instead of infinite recursion.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: chain-cycle-a
spec:
  schema:
    apiVersion: v1alpha1
    kind: CycleA
    group: e2e.kro-ui.dev
    spec:
      name: string | default=cycle-test
  resources:
    - id: cycleB
      template:
        apiVersion: kro.run/v1alpha1
        kind: CycleB
        metadata:
          name: ${schema.spec.name}-b
---
# chain-cycle-b RGD — counterpart to chain-cycle-a.yaml for cycle detection.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: chain-cycle-b
spec:
  schema:
    apiVersion: v1alpha1
    kind: CycleB
    group: e2e.kro-ui.dev
    spec:
      name: string | default=cycle-test
  resources:
    - id: cycleA
      template:
        apiVersion: kro.run/v1alpha1
        kind: CycleA
        metadata:
          name: ${schema.spec.name}-a
