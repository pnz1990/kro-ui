# scale-test-rgds.yaml — scale fixture: a single wide RGD with 20 resource
# nodes (the largest in CI). Exercises the kro-ui DAG renderer at scale,
# validates that the Overview loads within TTI budget, and catches regressions
# where the DAG locks up the browser on large graphs.
#
# Design ref: docs/design/27-stage3-kro-tracking.md §27.18 (🔲 → ✅)
# Applied by test/e2e/setup/global-setup.ts (6m block).
#
# Why 20 nodes (not 50):
#   A kind cluster's kro controller reconciles 20 ConfigMaps in <30s in CI.
#   50 resources would push E2E setup past the 20-minute budget. 20 is the
#   largest single RGD in the fixture corpus, sufficient to exercise the
#   linear-layout and arrow-routing paths in the DAG renderer.
#
# Node structure: fan-out — all resource nodes are children of the root CR,
# with no cross-resource dependencies. This maximises DAG width and exercises
# the horizontal layout path (the most stressful for the SVG renderer).
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: scale-wide
spec:
  schema:
    apiVersion: v1alpha1
    kind: ScaleWideApp
    group: e2e.kro-ui.dev
    spec:
      appName: string | default=scale-wide-test
    status:
      nodeCount: "20"
  resources:
    - id: configNode01
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-node-01
          namespace: kro-ui-demo
        data:
          node: "01"
          app: ${schema.spec.appName}
          group: scale-wide

    - id: configNode02
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appName}-node-02
